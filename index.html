<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>営業マン性格診断</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      max-width: 700px;
      width: 100%;
      padding: 40px;
      color: #fff;
    }

    /* START SCREEN */
    #start-screen { text-align: center; }
    #start-screen .logo { font-size: 3rem; margin-bottom: 10px; }
    #start-screen h1 { font-size: 1.8rem; margin-bottom: 8px; color: #e94560; }
    #start-screen p { color: #aaa; margin-bottom: 30px; line-height: 1.6; }

    .btn {
      background: linear-gradient(135deg, #e94560, #c0392b);
      color: #fff;
      border: none;
      padding: 14px 40px;
      border-radius: 30px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(233,69,96,0.4); }

    /* QUIZ SCREEN */
    #quiz-screen { display: none; }
    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin-bottom: 30px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #f5a623);
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .question-counter { color: #aaa; font-size: 0.85rem; margin-bottom: 8px; }
    .question-text {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 25px;
      line-height: 1.5;
    }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
      color: #fff;
      text-align: left;
      font-family: inherit;
    }
    .option:hover {
      background: rgba(233,69,96,0.2);
      border-color: #e94560;
      transform: translateX(4px);
    }
    .option.selected {
      background: rgba(233,69,96,0.3);
      border-color: #e94560;
    }

    /* RESULT SCREEN */
    #result-screen { display: none; text-align: center; }
    .result-badge {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin: 0 auto 20px;
    }
    .result-type { font-size: 1rem; color: #aaa; margin-bottom: 6px; }
    .result-name { font-size: 2rem; font-weight: bold; margin-bottom: 20px; }
    .result-desc {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 20px;
      text-align: left;
      line-height: 1.8;
      color: #ddd;
      margin-bottom: 20px;
    }
    .result-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .tag {
      background: rgba(233,69,96,0.2);
      border: 1px solid #e94560;
      color: #e94560;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
    }
    .strengths-weaknesses {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 25px;
    }
    .sw-box {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 15px;
      text-align: left;
    }
    .sw-box h4 { font-size: 0.9rem; margin-bottom: 10px; }
    .sw-box h4.strength { color: #2ecc71; }
    .sw-box h4.weakness { color: #e74c3c; }
    .sw-box ul { list-style: none; }
    .sw-box ul li { font-size: 0.85rem; color: #ccc; padding: 3px 0; }
    .sw-box ul li::before { content: "• "; color: #aaa; }

    @media (max-width: 500px) {
      .container { padding: 24px; }
      .strengths-weaknesses { grid-template-columns: 1fr; }
      .result-name { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- START -->
  <div id="start-screen">
    <div class="logo">💼</div>
    <h1>営業マン性格診断</h1>
    <p>あなたの営業スタイルと強みを発見しよう。<br>15問の質問に答えて、あなたのタイプを診断します。</p>
    <button class="btn" onclick="startQuiz()">診断スタート</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="question-counter" id="question-counter"></div>
    <div class="question-text" id="question-text"></div>
    <div class="options" id="options"></div>
  </div>

  <!-- RESULT -->
  <div id="result-screen">
    <div class="result-badge" id="result-badge"></div>
    <div class="result-type" id="result-type"></div>
    <div class="result-name" id="result-name"></div>
    <div class="result-desc" id="result-desc"></div>
    <div class="result-tags" id="result-tags"></div>
    <div class="strengths-weaknesses" id="sw"></div>
    <button class="btn" onclick="restart()">もう一度診断する</button>
  </div>

</div>

<script>

      { text: "顧客の声を社内にフィードバックするハブ役", scores: { hunter: 0, consultant: 3, relationship: 1, analyst: 1 } },

    ]
  },
  {

    options: [
      { text: "戦士型。どんな壁も突き破るパワー営業", scores: { hunter: 3, consultant: 0, relationship: 0, analyst: 0 } },

      { text: "友人型。一生付き合える信頼関係を築く営業", scores: { hunter: 0, consultant: 0, relationship: 3, analyst: 0 } },

const types = {

    strengths: ["粘り強い交渉力", "スピード感のある行動", "プレッシャーへの耐性", "強いクロージング力"],

let current = 0;
let scores = { hunter: 0, consultant: 0, relationship: 0, analyst: 0 };

function startQuiz() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById('question-counter').textContent = `質問 ${current + 1} / ${questions.length}`;
  document.getElementById('question-text').textContent = q.text;
  document.getElementById('progress-fill').style.width = `${(current / questions.length) * 100}%`;
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt.text;
    btn.onclick = () => selectOption(opt.scores);
    opts.appendChild(btn);
  });
}

function selectOption(optScores) {
  for (const key in optScores) scores[key] += optScores[key];
  current++;
  if (current < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('progress-fill').style.width = '100%';

  const topType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
  const t = types[topType];

  document.getElementById('result-badge').textContent = t.badge;
  document.getElementById('result-badge').style.background = t.color + '33';
  document.getElementById('result-badge').style.border = `2px solid ${t.color}`;
  document.getElementById('result-type').textContent = t.type;
  document.getElementById('result-name').textContent = t.name;
  document.getElementById('result-name').style.color = t.color;
  document.getElementById('result-desc').textContent = t.desc;

  const tagsEl = document.getElementById('result-tags');
  tagsEl.innerHTML = t.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

  const swEl = document.getElementById('sw');
  swEl.innerHTML = `
    <div class="sw-box">
      <h4 class="strength">強み</h4>
      <ul>${t.strengths.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>
    <div class="sw-box">
      <h4 class="weakness">成長ポイント</h4>
      <ul>${t.weaknesses.map(w => `<li>${w}</li>`).join('')}</ul>
    </div>`;
}

function restart() {
  current = 0;
  scores = { hunter: 0, consultant: 0, relationship: 0, analyst: 0 };
  document.getElementById('result-screen').style.display = 'none';
