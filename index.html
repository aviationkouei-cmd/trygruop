<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>インターン初期登録 | マインド診断</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

    :root {
      --red:    #e94560;
      --blue:   #3b82f6;
      --green:  #10b981;
      --yellow: #f59e0b;
      --bg:     #0f172a;
      --card:   rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.1);
      --text:   #f1f5f9;
      --muted:  #94a3b8;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
    }

    .wrap { width: 100%; max-width: 720px; }
    .screen { display: none; }
    .screen.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
    }

    /* ── START ── */
    #start { text-align: center; }
    .start-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .start-eyebrow {
      display: inline-block;
      background: rgba(233,69,96,0.15);
      border: 1px solid rgba(233,69,96,0.4);
      color: var(--red);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    #start h1 { font-size: 1.7rem; margin-bottom: 12px; }
    #start p { color: var(--muted); line-height: 1.8; margin-bottom: 32px; font-size: 0.95rem; }
    .pillars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 36px;
      text-align: left;
    }
    .pillar {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .pillar .num { font-size: 1.3rem; margin-bottom: 4px; }
    .pillar .label { color: var(--muted); font-size: 0.78rem; }
    .pillar .title { font-weight: bold; font-size: 0.88rem; }

    /* ── PROGRESS ── */
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .progress-label { font-size: 0.8rem; color: var(--muted); }
    .progress-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-bottom: 32px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--yellow)); border-radius: 2px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }

    /* ── QUESTION ── */
    .q-category { display: inline-block; font-size: 0.72rem; letter-spacing: 0.06em; padding: 3px 10px; border-radius: 20px; margin-bottom: 12px; }
    .q-text { font-size: 1.15rem; font-weight: bold; line-height: 1.6; margin-bottom: 24px; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option {
      display: flex; align-items: flex-start; gap: 14px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 18px; cursor: pointer;
      text-align: left; font-family: inherit; color: var(--text);
      transition: background .18s, border-color .18s, transform .18s;
      font-size: 0.93rem; line-height: 1.55;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none; user-select: none;
    }
    .option:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.25); transform: translateX(3px); }
    .option:active { background: rgba(233,69,96,0.2); border-color: rgba(233,69,96,0.5); }
    .option .key {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 8px;
      background: rgba(255,255,255,0.08); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: bold; color: var(--muted); margin-top: 1px;
    }
    .option .body .sub { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }

    /* ── RESULT ── */
    #result { text-align: center; }
    .result-hero {
      width: 90px; height: 90px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem; margin: 0 auto 20px;
    }
    .result-type-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .result-name { font-size: 1.9rem; font-weight: bold; margin-bottom: 8px; }
    .result-catch { font-size: 0.95rem; color: var(--muted); margin-bottom: 24px; }
    .result-desc {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px; text-align: left;
      line-height: 1.85; color: #cbd5e1; font-size: 0.93rem; margin-bottom: 20px;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 24px; }
    .tag { padding: 4px 14px; border-radius: 20px; font-size: 0.8rem; border: 1px solid; }

    /* score bars */
    .axes { margin-bottom: 28px; }
    .axes-title { font-size: 0.82rem; color: var(--muted); margin-bottom: 14px; text-align: left; font-weight: bold; }
    .axis-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .axis-name { font-size: 0.82rem; width: 110px; flex-shrink: 0; text-align: right; color: #cbd5e1; }
    .axis-track { flex: 1; height: 8px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
    .axis-fill { height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(.4,0,.2,1); }
    .axis-val { font-size: 0.78rem; color: var(--muted); width: 34px; text-align: left; }

    /* ── AI FEEDBACK SECTION ── */
    .ai-feedback-wrap { margin-bottom: 28px; }
    .ai-feedback-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }
    .ai-badge {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff; font-size: 0.72rem; font-weight: bold;
      padding: 4px 12px; border-radius: 20px; letter-spacing: 0.05em;
    }
    .ai-feedback-header h2 { font-size: 1rem; }

    .feedback-tabs {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .tab-btn {
      flex: 1; padding: 10px; border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--muted); font-family: inherit;
      font-size: 0.83rem; cursor: pointer;
      transition: all .2s;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none; user-select: none;
    }
    .tab-btn.active {
      background: rgba(124,58,237,0.2);
      border-color: rgba(124,58,237,0.5);
      color: #c4b5fd;
      font-weight: bold;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* MIND GROWTH */
    .mind-section { margin-bottom: 16px; }
    .mind-card {
      background: rgba(124,58,237,0.07);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 14px;
      padding: 18px 20px;
      text-align: left;
      margin-bottom: 12px;
    }
    .mind-card-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .mind-card-icon { font-size: 1.3rem; }
    .mind-card-title { font-size: 0.9rem; font-weight: bold; color: #c4b5fd; }
    .mind-card-body { font-size: 0.87rem; line-height: 1.8; color: #cbd5e1; }
    .mind-card-body strong { color: #e2e8f0; }
    .mind-quote {
      background: rgba(255,255,255,0.04);
      border-left: 3px solid #7c3aed;
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      margin-top: 10px;
      font-size: 0.83rem;
      color: #a78bfa;
      line-height: 1.7;
      font-style: italic;
    }

    /* ACTION TASKS */
    .task-week {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .task-week-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .week-badge {
      font-size: 0.72rem; font-weight: bold;
      padding: 3px 10px; border-radius: 20px; border: 1px solid;
    }
    .task-week-title { font-size: 0.88rem; font-weight: bold; }
    .task-list { list-style: none; padding: 0; }
    .task-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.85rem; line-height: 1.6; color: #cbd5e1;
    }
    .task-item:last-child { border-bottom: none; }
    .task-check {
      flex-shrink: 0; width: 18px; height: 18px;
      border-radius: 5px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      cursor: pointer; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: transparent;
      transition: all .2s;
    }
    .task-check.done {
      background: #10b981;
      border-color: #10b981;
      color: #fff;
    }
    .task-body strong { color: #e2e8f0; display: block; margin-bottom: 2px; }
    .task-body .why { font-size: 0.78rem; color: var(--muted); }
    .task-difficulty {
      flex-shrink: 0; font-size: 0.7rem;
      padding: 2px 8px; border-radius: 20px; margin-top: 3px;
      border: 1px solid;
    }

    /* mgt note */
    .mgt-note {
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 12px;
      padding: 16px 18px;
      font-size: 0.83rem; color: #93c5fd;
      line-height: 1.7; text-align: left; margin-bottom: 28px;
    }

    /* sw grid */
    .sw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
    .sw-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: left; }
    .sw-box h4 { font-size: 0.82rem; margin-bottom: 10px; }
    .sw-box ul { list-style: none; }
    .sw-box li { font-size: 0.82rem; color: #cbd5e1; padding: 3px 0 3px 14px; position: relative; }
    .sw-box li::before { content: "▸"; position: absolute; left: 0; color: var(--muted); font-size: 0.7rem; top: 4px; }

    .btn {
      background: linear-gradient(135deg, var(--red), #c0392b);
      color: #fff; border: none; padding: 14px 40px;
      border-radius: 30px; font-size: 1rem; cursor: pointer;
      transition: transform .2s, box-shadow .2s; font-family: inherit; font-weight: bold;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none; user-select: none;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(233,69,96,.35); }
    .btn:active { transform: scale(0.97); }

    @media (max-width: 520px) {
      .card { padding: 24px; }
      .pillars, .sw-grid { grid-template-columns: 1fr; }
      .result-name { font-size: 1.5rem; }
      .axis-name { width: 80px; font-size: 0.75rem; }
      .feedback-tabs { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ══════════ START ══════════ -->
  <div id="start" class="screen active card">
    <div class="start-icon">🧭</div>
    <div class="start-eyebrow">インターン 初期登録診断</div>
    <h1>あなたのマインドを<br>可視化しよう</h1>
    <p>7つの質問に答えるだけで、あなたの<strong>モチベーションの軸・行動スタイル・コミュニケーション傾向</strong>を診断。AIがあなた専用の成長フィードバックと行動タスクを提示します。</p>
    <div class="pillars">
      <div class="pillar"><div class="num">🔥</div><div class="title">モチベーション源泉</div><div class="label">Q1</div></div>
      <div class="pillar"><div class="num">💪</div><div class="title">レジリエンス・改善力</div><div class="label">Q2</div></div>
      <div class="pillar"><div class="num">🗣</div><div class="title">コミュニケーション</div><div class="label">Q3</div></div>
      <div class="pillar"><div class="num">🎯</div><div class="title">目標へのコミット</div><div class="label">Q4</div></div>
      <div class="pillar"><div class="num">⚡</div><div class="title">変化への対応力</div><div class="label">Q5</div></div>
      <div class="pillar"><div class="num">🪞</div><div class="title">自己認識・強み</div><div class="label">Q6</div></div>
      <div class="pillar"><div class="num">🚀</div><div class="title">インターンへの期待</div><div class="label">Q7</div></div>
    </div>
    <button class="btn" onclick="startQuiz()">診断をはじめる</button>
  </div>

  <!-- ══════════ QUIZ ══════════ -->
  <div id="quiz" class="screen card">
    <div class="progress-header">
      <span class="progress-label" id="q-counter"></span>
      <span class="progress-label" id="q-step"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="q-category" id="q-cat"></div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
  </div>

  <!-- ══════════ RESULT ══════════ -->
  <div id="result" class="screen card">
    <div class="result-hero" id="r-hero"></div>
    <div class="result-type-label" id="r-type-label"></div>
    <div class="result-name" id="r-name"></div>
    <div class="result-catch" id="r-catch"></div>
    <div class="result-desc" id="r-desc"></div>
    <div class="tags" id="r-tags"></div>
    <div class="axes" id="r-axes"></div>
    <div class="sw-grid" id="r-sw"></div>

    <!-- AI フィードバック -->
    <div class="ai-feedback-wrap">
      <div class="ai-feedback-header">
        <span class="ai-badge">✦ AI フィードバック</span>
        <h2>あなたへの成長アドバイス</h2>
      </div>
      <div class="feedback-tabs">
        <button class="tab-btn active" onclick="switchTab('mind', this)">🧠 マインド成長</button>
        <button class="tab-btn" onclick="switchTab('task', this)">✅ 行動タスク</button>
      </div>
      <div id="tab-mind" class="tab-panel active"></div>
      <div id="tab-task" class="tab-panel"></div>
    </div>

    <div class="mgt-note" id="r-note"></div>
    <button class="btn" onclick="restart()">もう一度診断する</button>
  </div>

</div>
<script>
/* ── QUESTIONS ── */
const Qs = [
  {
    category:"Q1 ｜ モチベーションの源泉", catColor:"#e94560",
    text:"あなたが最も「モチベーションが上がる」と感じる瞬間はどれですか？",
    options:[
      {key:"A",text:"目標を達成したり、人より高い成果を出して評価されたとき",sub:"成果・競争軸",scores:{achieve:3,empathy:0,logic:0,steady:0}},
      {key:"B",text:"顧客やチームのメンバーから「ありがとう」と感謝されたとき",sub:"貢献・対人軸",scores:{achieve:0,empathy:3,logic:0,steady:0}},
      {key:"C",text:"新しい知識やスキルを身に付け、自分の成長を実感できたとき",sub:"自己成長軸",scores:{achieve:1,empathy:0,logic:2,steady:1}},
      {key:"D",text:"計画通りに物事を進め、ミスなくやり遂げたとき",sub:"プロセス・安定軸",scores:{achieve:0,empathy:1,logic:1,steady:3}},
    ]
  },
  {
    category:"Q2 ｜ 壁にぶつかったときの行動", catColor:"#f59e0b",
    text:"高い目標に対して、思うように成果が出ないとき、最初に取る行動は？",
    options:[
      {key:"A",text:"とにかく行動量（打席数）を増やして、確率論で突破しようとする",sub:"行動量型",scores:{achieve:3,empathy:0,logic:0,steady:1}},
      {key:"B",text:"なぜ成果が出ないのか、これまでのプロセスを分析して改善策を考える",sub:"思考・分析型",scores:{achieve:1,empathy:0,logic:3,steady:1}},
      {key:"C",text:"成果が出ている先輩や上司にすぐに相談し、アドバイスを仰ぐ",sub:"素直さ・巻き込み型",scores:{achieve:1,empathy:2,logic:1,steady:0}},
      {key:"D",text:"一度気持ちをリフレッシュさせ、モチベーションを立て直してから再開する",sub:"メンタルコントロール型",scores:{achieve:0,empathy:1,logic:0,steady:3}},
    ]
  },
  {
    category:"Q3 ｜ コミュニケーションスタイル", catColor:"#10b981",
    text:"初対面の人と話すとき、あなたはどのような立ち回りをすることが多いですか？",
    options:[
      {key:"A",text:"自分から積極的に話題を提供し、場の雰囲気を盛り上げる",sub:"開拓・リード型",scores:{achieve:3,empathy:1,logic:0,steady:0}},
      {key:"B",text:"相手の話をじっくり聞き、相手が話しやすい空気を作る",sub:"傾聴・ヒアリング型",scores:{achieve:0,empathy:3,logic:1,steady:1}},
      {key:"C",text:"相手のプロフィールや共通点を事前にリサーチし、戦略的に話す",sub:"準備・ロジカル型",scores:{achieve:1,empathy:0,logic:3,steady:1}},
      {key:"D",text:"相手のテンションや好みに自然と自分を合わせる",sub:"適応・調和型",scores:{achieve:0,empathy:2,logic:0,steady:3}},
    ]
  },
  {
    category:"Q4 ｜ 目標へのコミットメント", catColor:"#e94560",
    text:"自分で決めた目標（または与えられた目標）に対するあなたのスタンスは？",
    options:[
      {key:"A",text:"何が何でも達成する。未達成で終わることは絶対に避けたい",sub:"執着度：高",scores:{achieve:3,empathy:0,logic:0,steady:1}},
      {key:"B",text:"高めの目標を設定し、たとえ未達成でもプロセスで得られるものがあれば良い",sub:"プロセス重視",scores:{achieve:1,empathy:1,logic:2,steady:0}},
      {key:"C",text:"確実に達成できる現実的な目標を立て、着実にクリアしていきたい",sub:"堅実重視",scores:{achieve:0,empathy:0,logic:1,steady:3}},
      {key:"D",text:"目標の数字よりも、自分が納得して楽しく取り組めるかを重視したい",sub:"納得感重視",scores:{achieve:0,empathy:3,logic:0,steady:1}},
    ]
  },
  {
    category:"Q5 ｜ 変化への対応力", catColor:"#3b82f6",
    text:"ルールや環境が急に変更されたり、新しい挑戦を求められたとき、どう感じますか？",
    options:[
      {key:"A",text:"チャンスだと捉え、ワクワクしてすぐに新しい環境に飛び込む",sub:"イノベーター型",scores:{achieve:3,empathy:1,logic:0,steady:0}},
      {key:"B",text:"変更の理由や背景を納得できれば、前向きに対応する",sub:"納得連動型",scores:{achieve:1,empathy:1,logic:2,steady:1}},
      {key:"C",text:"少し不安や抵抗を感じるが、周囲の出方を見ながら徐々に適応する",sub:"慎重型",scores:{achieve:0,empathy:2,logic:1,steady:2}},
      {key:"D",text:"これまでのやり方にこだわりがあり、変えることに対してストレスを感じやすい",sub:"保守型",scores:{achieve:0,empathy:0,logic:0,steady:3}},
    ]
  },
  {
    category:"Q6 ｜ 自己認識・現時点の強み", catColor:"#10b981",
    text:"周囲の友人から、あなたはどのような人だと言われることが多いですか？",
    options:[
      {key:"A",text:"「行動力がある」「エネルギーに溢れている」「負けず嫌い」",sub:"突破力",scores:{achieve:3,empathy:0,logic:0,steady:0}},
      {key:"B",text:"「話しやすい」「相談に乗ってくれる」「気が利く」",sub:"共感力",scores:{achieve:0,empathy:3,logic:0,steady:1}},
      {key:"C",text:"「頭が良い」「計画性がある」「落ち着いている」",sub:"論理力",scores:{achieve:0,empathy:0,logic:3,steady:1}},
      {key:"D",text:"「真面目」「コツコツやり抜く」「信頼できる」",sub:"継続力",scores:{achieve:0,empathy:1,logic:1,steady:3}},
    ]
  },
  {
    category:"Q7 ｜ インターンへの期待", catColor:"#f59e0b",
    text:"今回のインターンを通じて、あなたが「最も得たいもの」は何ですか？",

        tasks:[
          {title:"チームMTGで最低1回、自分から意見・質問を言う",why:"発言する習慣が存在感と影響力を徐々に高める",hard:"hard"},
          {title:"「こうすればもっと良くなるのでは？」という改善案を上司に1つ伝える",why:"安定プレイヤーから提案できる人材へのシフト",hard:"hard"},
          {title:"顧客へのフォローメールに「自分なりの一言」を添える",why:"定型文から抜け出す小さな創造性の練習",hard:"normal"},
        ]
      },
      {
        week:"Week 3-4", color:"#3b82f6", borderColor:"rgba(59,130,246,0.3)",
        title:"自分の実績を「見える化」する",
        tasks:[
          {title:"自分がこのインターンで取り組んだことを箇条書き5つにまとめる",why:"継続してきたことを言語化することで自己評価が正確になる",hard:"easy"},
          {title:"「今まで避けてきた種類の仕事」に一度だけ手を挙げる",why:"新しい自分を発見する体験が変化耐性を生む",hard:"hard"},
          {title:"上司・メンターに「成長したと感じる部分はどこですか？」と聞く",why:"客観的な成長評価がこのタイプの自信の源になる",hard:"normal"},
        ]
      },
    ]
  },
};

const axisLabels = {achieve:"成果・競争軸",empathy:"貢献・共感軸",logic:"論理・分析軸",steady:"継続・安定軸"};
const axisColors = {achieve:"#e94560",empathy:"#10b981",logic:"#3b82f6",steady:"#f59e0b"};
const diffLabels = {easy:{label:"やりやすい",color:"#10b981"},normal:{label:"ふつう",color:"#3b82f6"},hard:{label:"挑戦的",color:"#e94560"}};

let cur = 0;
let scores = {achieve:0,empathy:0,logic:0,steady:0};

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() { show('quiz'); render(); }

function render() {
  const q = Qs[cur];
  document.getElementById('q-counter').textContent = `質問 ${cur+1} / ${Qs.length}`;
  document.getElementById('q-step').textContent = `残り ${Qs.length-cur} 問`;
  document.getElementById('prog-fill').style.width = `${(cur/Qs.length)*100}%`;
  const catEl = document.getElementById('q-cat');
  catEl.textContent = q.category;
  catEl.style.cssText += `background:${q.catColor}22;border:1px solid ${q.catColor}66;color:${q.catColor}`;
  document.getElementById('q-text').textContent = q.text;
  const optsEl = document.getElementById('options');
  optsEl.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="key">${opt.key}</span><span class="body">${opt.text}${opt.sub?`<div class="sub">${opt.sub}</div>`:''}</span>`;
    btn.onclick = () => pick(opt.scores);
    optsEl.appendChild(btn);
  });
}

function pick(s) {
  for (const k in s) scores[k] += s[k];
  cur++;
  cur < Qs.length ? render() : showResult();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function showResult() {
  document.getElementById('prog-fill').style.width = '100%';
  const top = Object.keys(scores).reduce((a,b) => scores[a] >= scores[b] ? a : b);
  const t = Types[top];

  document.getElementById('r-hero').textContent = t.badge;
  document.getElementById('r-hero').style.cssText = `background:${t.color}22;border:2px solid ${t.color};`;
  document.getElementById('r-type-label').textContent = t.typeLabel;
  document.getElementById('r-name').textContent = t.name;
  document.getElementById('r-name').style.color = t.color;
  document.getElementById('r-catch').textContent = t.catch;
  document.getElementById('r-desc').textContent = t.desc;

  document.getElementById('r-tags').innerHTML = t.tags.map(tag =>
    `<span class="tag" style="color:${t.color};border-color:${t.color}44;background:${t.color}11">${tag}</span>`
  ).join('');

  const total = Object.values(scores).reduce((a,b)=>a+b,0) || 1;
  document.getElementById('r-axes').innerHTML = '<div class="axes-title">診断スコア内訳</div>' +
    Object.keys(scores).map(k => {
      const pct = Math.round((scores[k]/total)*100);
      return `<div class="axis-row">
        <div class="axis-name">${axisLabels[k]}</div>
        <div class="axis-track"><div class="axis-fill" style="width:0%;background:${axisColors[k]}" data-w="${pct}"></div></div>
        <div class="axis-val">${pct}%</div>
      </div>`;
    }).join('');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.axis-fill').forEach(el => { el.style.width = el.dataset.w + '%'; });
  }));

  document.getElementById('r-sw').innerHTML = `
    <div class="sw-box">
      <h4 style="color:#4ade80">▲ 強み</h4>
      <ul>${t.strengths.map(s=>`<li>${s}</li>`).join('')}</ul>
    </div>
    <div class="sw-box">
      <h4 style="color:#fb923c">◆ 成長ポイント</h4>
      <ul>${t.growth.map(g=>`<li>${g}</li>`).join('')}</ul>
    </div>`;

  /* AI FEEDBACK - MIND */
  document.getElementById('tab-mind').innerHTML = t.mindFeedback.map(f => `
    <div class="mind-card">
      <div class="mind-card-header">
        <span class="mind-card-icon">${f.icon}</span>
        <span class="mind-card-title">${f.title}</span>
      </div>
      <div class="mind-card-body">${f.body}</div>
      <div class="mind-quote">${f.quote}</div>
    </div>
  `).join('');

  /* AI FEEDBACK - TASKS */
  document.getElementById('tab-task').innerHTML = t.taskWeeks.map(w => `
    <div class="task-week">
      <div class="task-week-header">
        <span class="week-badge" style="color:${w.color};border-color:${w.color};background:${w.color}15">${w.week}</span>
        <span class="task-week-title">${w.title}</span>
      </div>
      <ul class="task-list">
        ${w.tasks.map((task,i) => {
          const d = diffLabels[task.hard];
          return `<li class="task-item">
            <div class="task-check" onclick="toggleCheck(this)" title="完了にする">✓</div>
            <div class="task-body">
              <strong>${task.title}</strong>
              <span class="why">💬 ${task.why}</span>
            </div>
            <span class="task-difficulty" style="color:${d.color};border-color:${d.color};background:${d.color}15">${d.label}</span>
          </li>`;
        }).join('')}
      </ul>
    </div>
  `).join('');

  document.getElementById('r-note').innerHTML =
    `<strong>💡 マネジメント活用メモ</strong><br>${t.mgtNote}`;

  show('result');
}

function toggleCheck(el) {
  el.classList.toggle('done');
}

function restart() {
  cur = 0;
  scores = {achieve:0,empathy:0,logic:0,steady:0};
  show('start');
}
</script>
</body>
</html>
