<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>インターン初期登録 | マインド診断</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #e94560;
      --blue:   #3b82f6;
      --green:  #10b981;
      --yellow: #f59e0b;
      --bg:     #0f172a;
      --card:   rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.1);
      --text:   #f1f5f9;
      --muted:  #94a3b8;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
    }

    .wrap {
      width: 100%;
      max-width: 680px;
    }

    /* ── SCREEN UTILS ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(12px);
    }

    /* ── START ── */
    #start { text-align: center; }
    .start-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .start-eyebrow {
      display: inline-block;
      background: rgba(233,69,96,0.15);
      border: 1px solid rgba(233,69,96,0.4);
      color: var(--red);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    #start h1 { font-size: 1.7rem; margin-bottom: 12px; }
    #start p { color: var(--muted); line-height: 1.8; margin-bottom: 32px; font-size: 0.95rem; }
    .pillars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 36px;
      text-align: left;
    }
    .pillar {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 0.85rem;
    }
    .pillar .num { font-size: 1.3rem; margin-bottom: 4px; }
    .pillar .label { color: var(--muted); font-size: 0.78rem; }
    .pillar .title { font-weight: bold; font-size: 0.88rem; }

    /* ── PROGRESS ── */
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .progress-label { font-size: 0.8rem; color: var(--muted); }
    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--yellow));
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }

    /* ── QUESTION ── */
    .q-category {
      display: inline-block;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .q-text {
      font-size: 1.15rem;
      font-weight: bold;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: var(--text);
      transition: background 0.18s, border-color 0.18s, transform 0.18s;
      font-size: 0.93rem;
      line-height: 1.55;
    }
    .option:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.25);
      transform: translateX(3px);
    }
    .option .key {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: bold;
      color: var(--muted);
      margin-top: 1px;
    }
    .option .body .sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── RESULT ── */
    #result { text-align: center; }
    .result-hero {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      margin: 0 auto 20px;
    }
    .result-type-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .result-name { font-size: 1.9rem; font-weight: bold; margin-bottom: 8px; }
    .result-catch { font-size: 0.95rem; color: var(--muted); margin-bottom: 24px; }

    .result-desc {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-align: left;
      line-height: 1.85;
      color: #cbd5e1;
      font-size: 0.93rem;
      margin-bottom: 20px;
    }

    .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 24px; }
    .tag {
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      border: 1px solid;
    }

    /* radar-like axis bars */
    .axes { margin-bottom: 24px; }
    .axes h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 14px; text-align: left; }
    .axis-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .axis-name { font-size: 0.82rem; width: 110px; flex-shrink: 0; text-align: right; color: #cbd5e1; }
    .axis-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      overflow: hidden;
    }
    .axis-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s cubic-bezier(.4,0,.2,1);
    }
    .axis-val { font-size: 0.78rem; color: var(--muted); width: 30px; text-align: left; }

    .sw-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }
    .sw-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      text-align: left;
    }
    .sw-box h4 { font-size: 0.82rem; margin-bottom: 10px; }
    .sw-box ul { list-style: none; }
    .sw-box li { font-size: 0.82rem; color: #cbd5e1; padding: 3px 0; padding-left: 14px; position: relative; }
    .sw-box li::before { content: "▸"; position: absolute; left: 0; color: var(--muted); font-size: 0.7rem; top: 4px; }

    .note {
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 12px;
      padding: 16px 18px;
      font-size: 0.83rem;
      color: #93c5fd;
      line-height: 1.7;
      text-align: left;
      margin-bottom: 28px;
    }

    /* ── BTN ── */
    .btn {
      background: linear-gradient(135deg, var(--red), #c0392b);
      color: #fff;
      border: none;
      padding: 14px 40px;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
      font-weight: bold;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(233,69,96,0.35); }

    @media (max-width: 520px) {
      .card { padding: 24px; }
      .pillars { grid-template-columns: 1fr; }
      .sw-grid { grid-template-columns: 1fr; }
      .result-name { font-size: 1.5rem; }
      .axis-name { width: 80px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ══════════ START ══════════ -->

    <button class="btn" onclick="startQuiz()">診断をはじめる</button>
  </div>

  <!-- ══════════ QUIZ ══════════ -->

    <div class="options" id="options"></div>
  </div>

  <!-- ══════════ RESULT ══════════ -->
  <div id="result" class="screen card">
    <div class="result-hero" id="r-hero"></div>
    <div class="result-type-label" id="r-type-label"></div>
    <div class="result-name" id="r-name"></div>
    <div class="result-catch" id="r-catch"></div>
    <div class="result-desc" id="r-desc"></div>
    <div class="tags" id="r-tags"></div>
    <div class="axes" id="r-axes"></div>
    <div class="sw-grid" id="r-sw"></div>
    <div class="note" id="r-note"></div>
    <button class="btn" onclick="restart()">もう一度診断する</button>
  </div>

</div>

    tags:["分析力","戦略思考","問題解決","PDCA"],
    strengths:["論理的なプレゼン・提案","課題の本質を見抜く力","勝率の高い案件設計","データ活用・市場分析"],
    growth:["行動する前に考えすぎることも","感情的な共感をもっと意識する","完璧主義によるスピード低下","チームへの情報共有を心がける"],
    mgtNote:"「なぜそうするか」の背景・根拠を示すと納得度が高まります。スキルアップの機会が最大のモチベーターに。",
  },
  steady: {
    badge:"🌱", color:"#f59e0b",
    typeLabel:"タイプ D",
    name:"堅実・継続型",
    catch:"コツコツが、最強の武器になる。",
    desc:"計画通り着実に積み上げることを好み、信頼性と安定感が武器のタイプ。ミスが少なく、長期的に安定した成果を出し続けます。既存顧客のフォローや複雑な事務処理・プロセス管理を得意とします。マネジメント側は「安心できる環境」と「段階的なチャレンジ」が効果的です。",
    tags:["継続力","安定性","高い信頼性","丁寧さ"],
    strengths:["高い継続性と安定したパフォーマンス","ミスの少ない丁寧な仕事","長期顧客関係の維持","プロセス管理・実行力"],
    growth:["変化や挑戦への適応スピードを高める","自分からリード・発言する機会を増やす","スピード感のある行動力を磨く","もっと大きい目標設定に挑戦する"],
    mgtNote:"急激な変化より段階的なチャレンジが有効。「安心して挑戦できる環境」を用意し、変化への耐性を少しずつ育てましょう。",
  },
};

const axisLabels = { achieve:"成果・競争軸", empathy:"貢献・共感軸", logic:"論理・分析軸", steady:"継続・安定軸" };
const axisColors = { achieve:"#e94560", empathy:"#10b981", logic:"#3b82f6", steady:"#f59e0b" };

/* ───────────── STATE ───────────── */
let cur = 0;
let scores = { achieve:0, empathy:0, logic:0, steady:0 };

/* ───────────── RENDER ───────────── */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() { show('quiz'); render(); }

function render() {
  const q = Qs[cur];
  document.getElementById('q-counter').textContent = `質問 ${cur+1} / ${Qs.length}`;
  document.getElementById('q-step').textContent = `残り ${Qs.length - cur} 問`;
  document.getElementById('prog-fill').style.width = `${(cur / Qs.length) * 100}%`;

  const catEl = document.getElementById('q-cat');
  catEl.textContent = q.category;
  catEl.style.background = q.catColor + '22';
  catEl.style.border = `1px solid ${q.catColor}66`;
  catEl.style.color = q.catColor;

  document.getElementById('q-text').textContent = q.text;

  const optsEl = document.getElementById('options');
  optsEl.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="key">${opt.key}</span><span class="body">${opt.text}${opt.sub ? `<div class="sub">${opt.sub}</div>` : ''}</span>`;
    btn.onclick = () => pick(opt.scores);
    optsEl.appendChild(btn);
  });
}

function pick(optScores) {
  for (const k in optScores) scores[k] += optScores[k];
  cur++;
  if (cur < Qs.length) { render(); }
  else { showResult(); }
}

/* ───────────── RESULT ───────────── */
function showResult() {
  document.getElementById('prog-fill').style.width = '100%';
  const top = Object.keys(scores).reduce((a,b) => scores[a] >= scores[b] ? a : b);
  const t = Types[top];

  document.getElementById('r-hero').textContent = t.badge;
  document.getElementById('r-hero').style.cssText += `background:${t.color}22;border:2px solid ${t.color};`;
  document.getElementById('r-type-label').textContent = t.typeLabel;
  document.getElementById('r-name').textContent = t.name;
  document.getElementById('r-name').style.color = t.color;
  document.getElementById('r-catch').textContent = t.catch;
  document.getElementById('r-desc').textContent = t.desc;

  document.getElementById('r-tags').innerHTML = t.tags.map(tag =>
    `<span class="tag" style="color:${t.color};border-color:${t.color}44;background:${t.color}11">${tag}</span>`
  ).join('');

  // axis bars
  const total = Object.values(scores).reduce((a,b)=>a+b,0) || 1;
  const axesEl = document.getElementById('r-axes');
  axesEl.innerHTML = '<h3>診断スコア内訳</h3>' + Object.keys(scores).map(k => {
    const pct = Math.round((scores[k] / total) * 100);
    return `<div class="axis-row">
      <div class="axis-name">${axisLabels[k]}</div>
      <div class="axis-track"><div class="axis-fill" style="width:0%;background:${axisColors[k]}" data-w="${pct}"></div></div>
      <div class="axis-val">${pct}%</div>
    </div>`;
  }).join('');

  // animate bars after paint
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.axis-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }));

  document.getElementById('r-sw').innerHTML = `
    <div class="sw-box">
      <h4 style="color:#4ade80">▲ 強み</h4>
      <ul>${t.strengths.map(s=>`<li>${s}</li>`).join('')}</ul>
    </div>
    <div class="sw-box">
      <h4 style="color:#fb923c">◆ 成長ポイント</h4>
      <ul>${t.growth.map(g=>`<li>${g}</li>`).join('')}</ul>
    </div>`;

  document.getElementById('r-note').innerHTML =
    `<strong>💡 マネジメント活用メモ</strong><br>${t.mgtNote}`;

  show('result');
}

function restart() {
  cur = 0;
  scores = { achieve:0, empathy:0, logic:0, steady:0 };
  show('start');
}
</script>
</body>
</html>
